{% extends 'base.html' %}


{% block content %}

<div class="row">
    <!-- Left sidebar -->

    <!-- load all code from sidebar.html-->

    {% include 'dashboard/sidebar.html' %}

    <!-- Right sidebar -->
    <div class="col-md-9">
        <span>loged in as <b>{{ user }}</b></span>
        <div class="row">
            <div class="col">
                <div class="card border-default mb-3">
                    <div class="card-header text-center text-uppercase font-weight-bold">All Categories</div>
                    <div class="card-body text-dark">
                        <h5 class="card-title text-color text-center">{{ category_count }}</h5>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card border-default mb-3">
                    <div class="card-header text-center text-uppercase font-weight-bold">All Posts</div>
                    <div class="card-body text-dark">
                        <h5 class="card-title text-color text-center">{{ blog_count }}</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>



{% endblock %}
